<ion-app>
  <ion-menu contentId="main-content" side="start">
    <ion-header>
      <ion-toolbar class="gcs-toolbar">
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/perfil" [color]="router.url.startsWith('/perfil') ? 'danger' : null" button>
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>Perfil</ion-label>
          </ion-item>
          <ion-item routerLink="/garaje" [color]="router.url.startsWith('/garaje') ? 'danger' : null" button>
            <ion-icon name="car-outline" slot="start"></ion-icon>
            <ion-label>Mi garaje</ion-label>
          </ion-item>
          <ion-item routerLink="/solicitudes" *ngIf="!isAdmin" [color]="router.url.startsWith('/solicitudes') ? 'danger' : null" button>
            <ion-icon name="document-text-outline" slot="start"></ion-icon>
            <ion-label>Mis solicitudes</ion-label>
          </ion-item>
          <ion-item routerLink="/admin" *ngIf="isAdmin" [color]="router.url.startsWith('/admin') ? 'danger' : null" button>
            <ion-icon name="settings-outline" slot="start"></ion-icon>
            <ion-label>Panel Admin</ion-label>
          </ion-item>
          <ion-item routerLink="/compras" [color]="router.url.startsWith('/compras') ? 'danger' : null" button>
            <ion-icon name="cart-outline" slot="start"></ion-icon>
            <ion-label>Compras</ion-label>
          </ion-item>
          <ion-item button (click)="logout()">
            <ion-icon name="log-out-outline" slot="start"></ion-icon>
            <ion-label>Cerrar sesión</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
